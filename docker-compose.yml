version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mockge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mockge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mockge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: mockge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mockge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mockge-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
