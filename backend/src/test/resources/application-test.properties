# Test Configuration Profile
spring.datasource.url=jdbc:tc:postgresql:15-alpine:///mockge_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=test
spring.datasource.password=test

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration for tests
app.jwt.secret=test-secret-key-for-jwt-token-generation-must-be-long-enough-for-hmac-sha
app.jwt.expiration-ms=3600000

# Redis Configuration for tests (disabled)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Liquibase
spring.liquibase.enabled=false

# Logging
logging.level.io.mockge.backend=DEBUG
logging.level.org.springframework.security=DEBUG
